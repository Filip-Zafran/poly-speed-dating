<!DOCTYPE html>
<html>
<head>
  <title>Connectors Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    h1 { color: #340c46; }
    .test-info { background: #e3f2fd; padding: 15px; border-radius: 4px; margin: 20px 0; border-left: 4px solid #009fe3; }
    .test-data { background: #f5f5f5; padding: 15px; border-radius: 4px; margin: 10px 0; font-family: monospace; }
    button { background: #e50051; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #c40045; }
    iframe { width: 100%; height: 2000px; border: 1px solid #ddd; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Connectors Test - 2 People with Matching Interests</h1>
    
    <div class="test-info">
      <h3>Test Scenario</h3>
      <p><strong>Person 1 (You):</strong> hiking, bouldering, yoga, museums, cafes</p>
      <p><strong>Person 2 (Match):</strong> hiking, bouldering, museums, cafes, galleries</p>
      <p><strong>Overlapping Interests:</strong> hiking, bouldering, museums, cafes (4 shared interests)</p>
    </div>
    
    <button onclick="setupTestData()">Load Test Data & Display Matches</button>
    <button onclick="location.reload()">Reset</button>
    
    <div id="status" class="test-data" style="display:none;"></div>
    
    <h2>Connectors Page</h2>
    <iframe id="connectorsFrame" src="http://localhost:8080/connectors.html" onload="setupTestData()"></iframe>
  </div>

  <script>
    function setupTestData() {
      const frame = document.getElementById('connectorsFrame');
      const status = document.getElementById('status');
      
      try {
        // Access the iframe's window and document
        const iframeDoc = frame.contentDocument || frame.contentWindow.document;
        const iframeWin = frame.contentWindow;
        
        // Wait a moment for the page to fully load
        setTimeout(() => {
          // Set test profile in localStorage (Person 1)
          const testProfile = {
            connectorsCompleted: true,
            instagram: "@testperson1",
            interests: ["hiking", "bouldering", "yoga", "museums", "cafes"]
          };
          iframeWin.localStorage.setItem("dda_connectors_demo_profile", JSON.stringify(testProfile));
          
          // Update demo matches - make Person 2 (Alex) have overlapping interests
          const updatedMatches = [
            {
              id: "match_1",
              name: "Alex",
              matchType: "Romantic Match",
              connectorsCompleted: true,
              instagram: "@alex_demo",
              interests: ["hiking", "bouldering", "museums", "cafes", "galleries"],
              likedEventIds: []
            }
          ];
          
          // Update the demoMatches in the iframe
          iframeWin.demoMatches = updatedMatches;
          
          // Call renderMatches to display the results
          if (iframeWin.renderMatches) {
            iframeWin.renderMatches().then(() => {
              status.style.display = 'block';
              status.innerHTML = `
                <strong>✅ Test data loaded!</strong><br><br>
                <strong>Person 1 (You):</strong><br>
                Interests: hiking, bouldering, yoga, museums, cafes<br><br>
                <strong>Person 2 (Alex):</strong><br>
                Interests: hiking, bouldering, museums, cafes, galleries<br><br>
                <strong>Overlapping (4 shared):</strong><br>
                hiking, bouldering, museums, cafes<br><br>
                The page should now show suggested events from the API for each shared interest.
              `;
            }).catch(err => {
              status.style.display = 'block';
              status.innerHTML = `<strong>✅ Test data loaded (with error):</strong> ${err.message}<br>Check console for details.`;
              console.error(err);
            });
          }
        }, 1000);
        
      } catch (error) {
        status.style.display = 'block';
        status.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
        console.error(error);
      }
    }
  </script>
</body>
</html>
